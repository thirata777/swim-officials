// ===== HELPERS =====
function calcAge(b) {
  if (!b) return "-";
  const t = new Date(), bd = new Date(b);
  let a = t.getFullYear() - bd.getFullYear();
  const m = t.getMonth() - bd.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < bd.getDate())) a--;
  return a;
}
function formatDate(d) {
  if (!d) return "-";
  const dt = new Date(d);
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}
function QualBadge({ q }) {
  const s = { "A級審判":"badge-a","B級審判":"badge-b","C級審判":"badge-c","なし":"badge-none" };
  return <span className={`qual-badge ${s[q]||"badge-none"}`}>{q}</span>;
}
function AttBadge({ status }) {
  if (status==="参加")    return <span className="att-badge att-yes">● 参加</span>;
  if (status==="不参加")  return <span className="att-badge att-no">✕ 不参加</span>;
  if (status==="一部回答") return <span className="att-badge att-partial">◑ 一部回答</span>;
  return <span className="att-badge att-pending">－ 未回答</span>;
}

// ===== SHARED ATTENDANCE CARD =====
function AttCard({ item, userId, attendance, setAttendance, todayStr }) {
  const getA = (date) => attendance[`${userId}_${item.id}_${date}`] || "未回答";
  const setA = (date, val) => setAttendance(p => ({ ...p, [`${userId}_${item.id}_${date}`]: val }));
  const isPast = item.deadline < todayStr;
  const ss = item.dates.map(d => getA(d));
  const summary = ss.every(s=>s==="参加") ? "参加" : ss.every(s=>s==="不参加") ? "不参加" : ss.every(s=>s==="未回答") ? "未回答" : "一部回答";
  const cls = { "参加":"att-card-yes","不参加":"att-card-no","一部回答":"att-card-partial" }[summary] || "";
  return (
    <div className={`meet-att-card ${cls}`}>
      <div className="meet-att-header">
        <div className="meet-name">{item.name}</div>
        <AttBadge status={summary}/>
      </div>
      <div className="meet-meta">
        <span>📍 {item.venue}{item.lane && item.lane!=="-" ? `　🏊 ${item.lane}` : ""}</span>
        {item.category && <span><span className={`train-cat-badge ${item.category==="義務"?"cat-required":"cat-optional"}`}>{item.category}</span></span>}
        {item.organizer && <span>🏢 {item.organizer}</span>}
        {item.targetQual && item.targetQual.length>0 && <span>🎯 対象：{item.targetQual.join("・")}</span>}
        {item.notes && <span className="train-notes">📝 {item.notes}</span>}
      </div>
      <div className="meet-att-deadline">
        受付締切：<span className={isPast?"deadline-past":""}>{formatDate(item.deadline)}{isPast?"（締切済）":""}</span>
      </div>
      <div className="date-att-list">
        {item.dates.map(date => {
          const att = getA(date);
          return (
            <div key={date} className="date-att-row">
              <span className="date-att-label">📅 {formatDate(date)}</span>
              {!isPast ? (
                <div className="att-btn-row">
                  <button className={`att-btn yes ${att==="参加"?"selected":""}`} onClick={()=>setA(date,"参加")}>● 参加</button>
                  <button className={`att-btn no ${att==="不参加"?"selected":""}`} onClick={()=>setA(date,"不参加")}>✕ 不参加</button>
                  {att!=="未回答" && <button className="att-btn reset" onClick={()=>setA(date,"未回答")}>取消</button>}
                </div>
              ) : <AttBadge status={att}/>}
            </div>
          );
        })}
      </div>
      {isPast && <div className="att-closed">回答締切済み</div>}
    </div>
  );
}

// ===== GAS API URL =====
const GAS_URL = "https://script.google.com/macros/s/AKfycbzKI4bqINFH-xuRDstkKyCYbu2nl5SpHXVb3ny-gRFq0We5YhB1E6x0WafXEhPkeirYzw/exec";

const api = async (body) => {
  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(body),
  });
  return res.json();
};

// ===== LOGIN =====
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("official");
  const [id, setId] = useState(""); const [pw, setPw] = useState("");
  const [err, setErr] = useState(""); const [ripple, setRipple] = useState(false);
  const [loading, setLoading] = useState(false);

  const go = async () => {
    setRipple(true); setTimeout(()=>setRipple(false),600);
    setLoading(true); setErr("");
    try {
      const res = await api({ action:"login", type:mode, id, password:pw, username:id });
      if (res.ok) onLogin(res.role, res.userId||null);
      else setErr(res.message||"ログインに失敗しました");
    } catch(e) {
      setErr("通信エラーが発生しました。しばらくしてから再試行してください。");
    }
    setLoading(false);
  };
  return (
    <div className="login-wrap">
      <div className="login-bg">{[...Array(12)].map((_,i)=><div key={i} className={`wave wave-${i%4}`} style={{animationDelay:`${i*0.3}s`,top:`${10+i*7}%`}}/>)}</div>
      <div className="login-card">
        <div className="login-logo">
          <svg viewBox="0 0 60 60" width="52" height="52">
            <ellipse cx="30" cy="30" rx="28" ry="28" fill="none" stroke="#38bdf8" strokeWidth="2.5"/>
            <path d="M10 38 Q20 28 30 38 Q40 48 50 38" fill="none" stroke="#38bdf8" strokeWidth="2.5" strokeLinecap="round"/>
            <path d="M10 28 Q20 18 30 28 Q40 38 50 28" fill="none" stroke="#7dd3fc" strokeWidth="2" strokeLinecap="round"/>
            <circle cx="30" cy="22" r="5" fill="#38bdf8" opacity="0.85"/>
          </svg>
        </div>
        <h1 className="login-title">競技役員管理システム</h1>
        <p className="login-subtitle">福岡県水泳連盟</p>
        <div className="tab-row">
          <button className={`tab-btn ${mode==="official"?"active":""}`} onClick={()=>{setMode("official");setErr("");}}>競技役員</button>
          <button className={`tab-btn ${mode==="admin"?"active":""}`} onClick={()=>{setMode("admin");setErr("");}}>管理者</button>
        </div>
        <div className="field-group">
          <label>{mode==="admin"?"ユーザー名":"登録番号"}</label>
          <input value={id} onChange={e=>{setId(e.target.value);setErr("");}} placeholder={mode==="admin"?"admin":"例：400356"} onKeyDown={e=>e.key==="Enter"&&go()} disabled={loading}/>
        </div>
        <div className="field-group">
          <label>パスワード</label>
          <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&go()} disabled={loading}/>
        </div>
        {err && <div className="login-error">{err}</div>}
        <button className={`login-btn ${ripple?"ripple":""}`} onClick={go} disabled={loading}>
          {loading ? "認証中..." : "ログイン"}
        </button>
        <p className="login-hint">{mode==="official"?"※ 登録番号は事務局から発行されます":"※ 管理者専用ページです"}</p>
      </div>
    </div>
  );
}

// ===== OFFICIAL VIEW =====
function OfficialView({ userId, officials, setOfficials, meets, trainings, attendance, setAttendance, onLogout }) {
  const [tab, setTab] = useState("mypage");
  const [editing, setEditing] = useState(false);
  const [ef, setEf] = useState({ name:"", kana:"", birthdate:"", email:"", phone:"", pw:"", npw:"", npw2:"" });
  const me = officials.find(o=>o.id===userId);
  const todayStr = new Date().toISOString().slice(0,10);

  const startEdit = () => { setEf({ name:me.name||"", kana:me.kana||"", birthdate:me.birthdate||"", email:me.email||"", phone:me.phone||"", pw:"", npw:"", npw2:"" }); setEditing(true); };
  const saveEdit = () => {
    if (!ef.name.trim()) { alert("氏名を入力してください"); return; }
    if (ef.npw) {
      if (!ef.pw) { alert("現在のパスワードを入力してください"); return; }
      if (ef.pw !== me.password) { alert("現在のパスワードが正しくありません"); return; }
      if (ef.npw !== ef.npw2) { alert("新しいパスワードが一致しません"); return; }
    }
    setOfficials(p=>p.map(o=>o.id!==userId?o:{...o,name:ef.name,kana:ef.kana,birthdate:ef.birthdate,email:ef.email,phone:ef.phone,...(ef.npw?{password:ef.npw}:{})}));
    setEditing(false);
  };

  const upM = meets.filter(m=>m.dates[0]>=todayStr).sort((a,b)=>a.dates[0].localeCompare(b.dates[0]));
  const upT = trainings.filter(t=>t.dates[0]>=todayStr).sort((a,b)=>a.dates[0].localeCompare(b.dates[0]));
  const getSummary = (item) => {
    const ss = item.dates.map(d=>attendance[`${userId}_${item.id}_${d}`]||"未回答");
    if(ss.every(s=>s==="参加"))return"参加"; if(ss.every(s=>s==="不参加"))return"不参加"; if(ss.every(s=>s==="未回答"))return"未回答"; return"一部回答";
  };
  const pmeets = upM.filter(m=>m.deadline>=todayStr && m.dates.some(d=>!attendance[`${userId}_${m.id}_${d}`]));
  const ptrains = upT.filter(t=>t.deadline>=todayStr && t.dates.some(d=>!attendance[`${userId}_${t.id}_${d}`]));

  return (
    <div className="main-wrap">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <svg viewBox="0 0 40 40" width="32" height="32">
            <ellipse cx="20" cy="20" rx="18" ry="18" fill="none" stroke="#38bdf8" strokeWidth="2"/>
            <path d="M6 26 Q13 18 20 26 Q27 34 34 26" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round"/>
            <path d="M6 18 Q13 10 20 18 Q27 26 34 18" fill="none" stroke="#7dd3fc" strokeWidth="1.5" strokeLinecap="round"/>
            <circle cx="20" cy="13" r="3.5" fill="#38bdf8" opacity="0.9"/>
          </svg>
          <span>役員ポータル</span>
        </div>
        <nav className="sidebar-nav">
          <div className={`nav-item ${tab==="mypage"?"active":""}`} onClick={()=>{setTab("mypage");setEditing(false);}}>マイページ</div>
          <div className={`nav-item ${tab==="meets"?"active":""}`} onClick={()=>setTab("meets")}>
            大会・出欠 {pmeets.length>0&&<span className="nav-badge">{pmeets.length}</span>}
          </div>
          <div className={`nav-item ${tab==="trainings"?"active":""}`} onClick={()=>setTab("trainings")}>
            研修会・出欠 {ptrains.length>0&&<span className="nav-badge">{ptrains.length}</span>}
          </div>
        </nav>
        <button className="logout-btn" onClick={onLogout}>ログアウト</button>
      </aside>
      <main className="content">

        {tab==="mypage" && me && (
          <>
            <div className="page-header">
              <h2>マイページ</h2>
              {!editing && <button className="btn-primary" onClick={startEdit}>✏️ 編集</button>}
            </div>
            {!editing ? (
              <div className="official-profile-card">
                <div className="profile-avatar">{me.name.charAt(0)}</div>
                <div className="profile-info">
                  <h3>{me.name}</h3>
                  <p className="profile-kana">{me.kana}</p>
                  <div className="profile-section-label">基本情報（自分で編集可）</div>
                  <div className="profile-row"><span className="profile-label">登録番号</span><span className="profile-val mono">{me.id}</span></div>
                  <div className="profile-row"><span className="profile-label">資格</span><QualBadge q={me.qualification}/></div>
                  <div className="profile-row"><span className="profile-label">有効期限</span><span className="profile-val">{formatDate(me.expiry)}</span></div>
                  <div className="profile-row"><span className="profile-label">生年月日</span><span className="profile-val">{formatDate(me.birthdate)}</span></div>
                  <div className="profile-row"><span className="profile-label">年齢</span><span className="profile-val">{calcAge(me.birthdate)}歳</span></div>
                  <div className="profile-divider"/>
                  <div className="profile-section-label">連絡先情報（自分で編集可）</div>
                  <div className="profile-row"><span className="profile-label">メール</span><span className="profile-val">{me.email||<span className="unset">未登録</span>}</span></div>
                  <div className="profile-row"><span className="profile-label">携帯電話</span><span className="profile-val">{me.phone||<span className="unset">未登録</span>}</span></div>
                  <div className="profile-divider"/>
                  <div className="profile-section-label">変更不可（管理者のみ）</div>
                  <div className="profile-row"><span className="profile-label">資格・期限</span><span className="profile-val" style={{fontSize:"0.8rem",color:"#64748b"}}>管理者にお問い合わせください</span></div>
                </div>
              </div>
            ) : (
              <div className="edit-card">
                <div className="edit-card-title">プロフィール編集</div>
                <div className="edit-note">※ 資格・有効期限・登録番号は管理者にお問い合わせください</div>
                <div className="edit-section-label">基本情報</div>
                <div className="form-grid">
                  <div className="field-group"><label>氏名</label><input value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))} placeholder="例：山田 太郎"/></div>
                  <div className="field-group"><label>読み仮名</label><input value={ef.kana} onChange={e=>setEf(p=>({...p,kana:e.target.value}))} placeholder="例：やまだ たろう"/></div>
                  <div className="field-group"><label>生年月日</label><input type="date" value={ef.birthdate} onChange={e=>setEf(p=>({...p,birthdate:e.target.value}))}/></div>
                </div>
                <div className="edit-section-label" style={{marginTop:"18px"}}>連絡先情報</div>
                <div className="form-grid">
                  <div className="field-group field-full"><label>メールアドレス</label><input type="email" value={ef.email} onChange={e=>setEf(p=>({...p,email:e.target.value}))} placeholder="例：yamada@example.com"/></div>
                  <div className="field-group field-full"><label>携帯電話</label><input type="tel" value={ef.phone} onChange={e=>setEf(p=>({...p,phone:e.target.value}))} placeholder="例：090-1234-5678"/></div>
                </div>
                <div className="edit-section-label" style={{marginTop:"18px"}}>パスワード変更（変更しない場合は空欄）</div>
                <div className="form-grid">
                  <div className="field-group field-full"><label>現在のパスワード</label><input type="password" value={ef.pw} onChange={e=>setEf(p=>({...p,pw:e.target.value}))} placeholder="現在のパスワード" autoComplete="current-password"/></div>
                  <div className="field-group"><label>新しいパスワード</label><input type="password" value={ef.npw} onChange={e=>setEf(p=>({...p,npw:e.target.value}))} placeholder="新しいパスワード" autoComplete="new-password"/></div>
                  <div className="field-group"><label>確認（再入力）</label><input type="password" value={ef.npw2} onChange={e=>setEf(p=>({...p,npw2:e.target.value}))} placeholder="もう一度入力" autoComplete="new-password"/></div>
                </div>
                <div className="modal-actions" style={{marginTop:"20px"}}>
                  <button className="btn-secondary" onClick={()=>setEditing(false)}>キャンセル</button>
                  <button className="btn-primary" onClick={saveEdit}>保存する</button>
                </div>
              </div>
            )}
            {!editing && (pmeets.length+ptrains.length)>0 && (
              <>
                <div className="section-title" style={{marginTop:"28px"}}>未回答の出欠（{pmeets.length+ptrains.length}件）</div>
                <div className="meet-att-grid">
                  {pmeets.map(m=><AttCard key={m.id} item={m} userId={userId} attendance={attendance} setAttendance={setAttendance} todayStr={todayStr}/>)}
                  {ptrains.map(t=><AttCard key={t.id} item={t} userId={userId} attendance={attendance} setAttendance={setAttendance} todayStr={todayStr}/>)}
                </div>
              </>
            )}
          </>
        )}

        {tab==="meets" && (
          <>
            <div className="page-header"><h2>大会一覧・出欠入力</h2><span className="header-sub">{upM.length}件</span></div>
            <div className="att-summary-row">
              {[["参加","att-sum-yes"],["不参加","att-sum-no"],["一部回答","att-sum-partial"],["未回答","att-sum-pending"]].map(([s,c])=>(
                <span key={s} className={`att-sum ${c}`}>{s} {upM.filter(m=>getSummary(m)===s).length}件</span>
              ))}
            </div>
            <div className="meet-att-grid">
              {upM.map(m=><AttCard key={m.id} item={m} userId={userId} attendance={attendance} setAttendance={setAttendance} todayStr={todayStr}/>)}
              {upM.length===0&&<p style={{color:"#64748b",fontSize:"0.88rem"}}>開催予定の大会はありません</p>}
            </div>
          </>
        )}

        {tab==="trainings" && (
          <>
            <div className="page-header"><h2>研修会一覧・出欠入力</h2><span className="header-sub">{upT.length}件</span></div>
            <div className="att-summary-row">
              {[["参加","att-sum-yes"],["不参加","att-sum-no"],["未回答","att-sum-pending"]].map(([s,c])=>(
                <span key={s} className={`att-sum ${c}`}>{s} {upT.filter(t=>getSummary(t)===s).length}件</span>
              ))}
            </div>
            <div className="meet-att-grid">
              {upT.map(t=><AttCard key={t.id} item={t} userId={userId} attendance={attendance} setAttendance={setAttendance} todayStr={todayStr}/>)}

      </main>
    </div>
  );
}

// ===== ADMIN VIEW =====
function AdminView({ officials, setOfficials, meets, setMeets, trainings, setTrainings, attendance, onLogout }) {
  const [tab, setTab] = useState("officials");
  const [offModal, setOffModal] = useState(null);
  const [meetModal, setMeetModal] = useState(null);
  const [trainModal, setTrainModal] = useState(null);
  const [confirmDlg, setConfirmDlg] = useState(null);
  const [csvModal, setCsvModal] = useState(null); // { title, content }
  const [attType, setAttType] = useState("meet");
  const [selectedId, setSelectedId] = useState(meets[0]?.id||"");
  const [search, setSearch] = useState("");
  const [offSort, setOffSort] = useState({ key:"id", dir:1 });
  const [meetSort, setMeetSort] = useState({ key:"date", dir:1 });
  const [trainSort, setTrainSort] = useState({ key:"date", dir:1 });
  const todayStr = new Date().toISOString().slice(0,10);

  const confirm = (message, onOk) => setConfirmDlg({ message, onOk });

  const emptyOff = { id:"",name:"",kana:"",qualification:"なし",expiry:"",birthdate:"",password:"",email:"",phone:"" };
  const emptyEv  = { id:"",name:"",dates:[""],venue:"",lane:"25m",deadline:"",capacity:"",organizer:"" };
  const emptyTrain = { id:"",name:"",dates:[""],venue:"",deadline:"",capacity:"",category:"任意",targetQual:[],organizer:"",notes:"" };
  const [offF, setOffF] = useState(emptyOff);
  const [meetF, setMeetF] = useState(emptyEv);
  const [trainF, setTrainF] = useState(emptyTrain);

  const saveOff = () => {
    if (!/^\d{6}$/.test(offF.id)) { setConfirmDlg({ message:"登録番号は6桁の数字で入力してください", onOk:null }); return; }
    if (offModal==="new" && officials.find(o=>o.id===offF.id)) { setConfirmDlg({ message:"この登録番号はすでに使用されています", onOk:null }); return; }
    if (offModal==="new") {
      setOfficials(p=>[...p, offF]);
    } else {
      setOfficials(p=>p.map(o=>{
        if (o.id!==offF.id) return o;
        return { ...o, ...offF, password: offF.password ? offF.password : o.password };
      }));
    }
    setOffModal(null);
  };
  const saveMeet = () => {
    const m={...meetF,dates:meetF.dates.filter(d=>d),capacity:Number(meetF.capacity)};
    if(meetModal==="new")setMeets(p=>[...p,m]);else setMeets(p=>p.map(x=>x.id===m.id?m:x));
    setMeetModal(null);
  };
  const saveTrain = () => {
    const t={...trainF,dates:trainF.dates.filter(d=>d),capacity:Number(trainF.capacity)};
    if(trainModal==="new")setTrainings(p=>[...p,t]);else setTrainings(p=>p.map(x=>x.id===t.id?t:x));
    setTrainModal(null);
  };

  // Sort helpers
  const sortedOff = [...officials].filter(o=>o.name.includes(search)||o.kana.includes(search)||o.id.includes(search)).sort((a,b)=>{
    const v = offSort.key==="id" ? a.id.localeCompare(b.id) : offSort.key==="name" ? a.name.localeCompare(b.name,"ja") : offSort.key==="qualification" ? a.qualification.localeCompare(b.qualification) : offSort.key==="expiry" ? (a.expiry||"").localeCompare(b.expiry||"") : 0;
    return v * offSort.dir;
  });
  const sortedMeets = [...meets].sort((a,b)=>{
    const v = meetSort.key==="date" ? a.dates[0].localeCompare(b.dates[0]) : meetSort.key==="name" ? a.name.localeCompare(b.name,"ja") : meetSort.key==="venue" ? a.venue.localeCompare(b.venue,"ja") : 0;
    return v * meetSort.dir;
  });
  const sortedTrainings = [...trainings].sort((a,b)=>{
    const v = trainSort.key==="date" ? a.dates[0].localeCompare(b.dates[0]) : trainSort.key==="name" ? a.name.localeCompare(b.name,"ja") : 0;
    return v * trainSort.dir;
  });

  const SortTh = ({ label, sortKey, sortState, setSortState }) => {
    const active = sortState.key===sortKey;
    return (
      <th onClick={()=>setSortState(p=>({ key:sortKey, dir: p.key===sortKey ? p.dir*-1 : 1 }))} style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}}>
        {label} <span style={{opacity:active?1:0.3,fontSize:"0.7rem"}}>{active&&sortState.dir===1?"▲":"▼"}</span>
      </th>
    );
  };

  const getAtt = (oId,itemId,date) => attendance[`${oId}_${itemId}_${date}`]||"未回答";
  const attItems = attType==="meet" ? meets : trainings;
  const selItem = attItems.find(x=>x.id===selectedId);

  const EventModal = ({ form, setForm, modal, setModal, save, prefix }) => (
    <div className="modal-overlay">
      <div className="modal modal-wide" onClick={e=>e.stopPropagation()}>
        <h3>{modal==="new"?`${prefix} 新規登録`:`${prefix} 編集`}</h3>
        <div className="form-grid">
          <div className="field-group"><label>ID</label><input value={form.id} onChange={e=>setForm(p=>({...p,id:e.target.value}))} readOnly={modal==="edit"}/></div>
          <div className="field-group field-full"><label>名称</label><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
          <div className="field-group field-full">
            <label>開催日（複数日対応）</label>
            {form.dates.map((d,i)=>(
              <div key={i} className="date-row">
                <input type="date" value={d} onChange={e=>{const nd=[...form.dates];nd[i]=e.target.value;setForm(p=>({...p,dates:nd}));}}/>
                {form.dates.length>1&&<button className="btn-icon-del" onClick={()=>setForm(p=>({...p,dates:p.dates.filter((_,j)=>j!==i)}))}>✕</button>}
              </div>
            ))}
            <button className="btn-add-date" onClick={()=>setForm(p=>({...p,dates:[...p.dates,""]}))}>＋ 日付を追加</button>
          </div>
          <div className="field-group"><label>会場</label><input value={form.venue} onChange={e=>setForm(p=>({...p,venue:e.target.value}))}/></div>
          <div className="field-group"><label>水路</label>
            <select value={form.lane} onChange={e=>setForm(p=>({...p,lane:e.target.value}))}>
              <option value="25m">25m</option><option value="50m">50m</option><option value="-">なし</option>
            </select>
          </div>
          <div className="field-group"><label>主催団体</label><input value={form.organizer||""} onChange={e=>setForm(p=>({...p,organizer:e.target.value}))}/></div>
          <div className="field-group"><label>受付締切日</label><input type="date" value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/></div>
          <div className="field-group"><label>定員</label><input type="number" value={form.capacity} onChange={e=>setForm(p=>({...p,capacity:e.target.value}))}/></div>
        </div>
        <div className="modal-actions">
          <button className="btn-secondary" onClick={()=>setModal(null)}>キャンセル</button>
          <button className="btn-primary" onClick={save}>保存</button>
        </div>
      </div>
    </div>
  );

  // CSV modal
  const buildCSV = (headers, rows) => {
    const escape = v => { const s = v==null?"":String(v); return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:s; };
    return [headers,...rows].map(r=>r.map(escape).join(",")).join("\n");
  };
  const exportOfficials = () => {
    const h = ["登録番号","氏名","読み仮名","資格","有効期限","生年月日","年齢","メールアドレス","携帯電話"];
    const r = sortedOff.map(o=>[o.id,o.name,o.kana,o.qualification,o.expiry||"",o.birthdate||"",calcAge(o.birthdate),o.email||"",o.phone||""]);
    setCsvModal({ title:"役員一覧", content: buildCSV(h,r) });
  };
  const exportMeets = () => {
    const h = ["ID","大会名","開催日（開始）","開催日（終了）","会場","水路","主催","受付締切","定員"];
    const r = sortedMeets.map(m=>[m.id,m.name,m.dates[0]||"",m.dates[m.dates.length-1]||"",m.venue,m.lane||"",m.organizer||"",m.deadline||"",m.capacity]);
    setCsvModal({ title:"大会一覧", content: buildCSV(h,r) });
  };
  const exportTrainings = () => {
    const h = ["ID","研修会名","種別","対象資格","開催日（開始）","開催日（終了）","会場","主催","受付締切","定員","備考"];
    const r = sortedTrainings.map(t=>[t.id,t.name,t.category||"",(t.targetQual||[]).join("・"),t.dates[0]||"",t.dates[t.dates.length-1]||"",t.venue,t.organizer||"",t.deadline||"",t.capacity,t.notes||""]);
    setCsvModal({ title:"研修会一覧", content: buildCSV(h,r) });
  };
  const exportAttendance = () => {
    if(!selItem) return;
    const h = ["登録番号","氏名","資格",...selItem.dates];
    const r = officials.map(o=>[o.id,o.name,o.qualification,...selItem.dates.map(d=>getAtt(o.id,selItem.id,d))]);
    setCsvModal({ title:`出欠 ${selItem.name}`, content: buildCSV(h,r) });
  };

  return (
    <div className="main-wrap">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <svg viewBox="0 0 40 40" width="32" height="32">
            <ellipse cx="20" cy="20" rx="18" ry="18" fill="none" stroke="#38bdf8" strokeWidth="2"/>
            <path d="M6 26 Q13 18 20 26 Q27 34 34 26" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round"/>
            <path d="M6 18 Q13 10 20 18 Q27 26 34 18" fill="none" stroke="#7dd3fc" strokeWidth="1.5" strokeLinecap="round"/>
            <circle cx="20" cy="13" r="3.5" fill="#38bdf8" opacity="0.9"/>
          </svg>
          <span>管理者パネル</span>
        </div>
        <nav className="sidebar-nav">
          {[["officials","役員管理"],["meets","大会管理"],["trainings","研修会管理"],["attendance","出欠状況"],["dashboard","ダッシュボード"]].map(([k,l])=>(
            <div key={k} className={`nav-item ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{l}</div>
          ))}
        </nav>
        <button className="logout-btn" onClick={onLogout}>ログアウト</button>
      </aside>
      <main className="content">

        {tab==="officials" && (
          <>
            <div className="page-header"><h2>役員管理</h2><div style={{display:"flex",gap:"8px"}}><button className="btn-csv" onClick={exportOfficials}>⬇ CSV出力</button><button className="btn-primary" onClick={()=>{setOffF({...emptyOff});setOffModal("new");}}>＋ 新規登録</button></div></div>
            <div className="search-bar"><input placeholder="氏名・読み仮名・登録番号で検索" value={search} onChange={e=>setSearch(e.target.value)}/></div>
            <div className="table-wrap">
              <table className="data-table">
                <thead><tr>
                  <SortTh label="登録番号" sortKey="id" sortState={offSort} setSortState={setOffSort}/>
                  <SortTh label="氏名" sortKey="name" sortState={offSort} setSortState={setOffSort}/>
                  <th>読み仮名</th>
                  <SortTh label="資格" sortKey="qualification" sortState={offSort} setSortState={setOffSort}/>
                  <SortTh label="有効期限" sortKey="expiry" sortState={offSort} setSortState={setOffSort}/>
                  <th>生年月日</th><th>年齢</th><th>メール</th><th>携帯</th><th>PW</th><th>操作</th>
                </tr></thead>
                <tbody>
                  {sortedOff.map(o=>(
                    <tr key={o.id}>
                      <td className="mono">{o.id}</td><td className="bold">{o.name}</td><td>{o.kana}</td>
                      <td><QualBadge q={o.qualification}/></td>
                      <td>{formatDate(o.expiry)}</td><td>{formatDate(o.birthdate)}</td><td>{calcAge(o.birthdate)}歳</td>

        {tab==="meets" && (

            <div className="page-header"><h2>大会管理</h2><div style={{display:"flex",gap:"8px"}}><button className="btn-csv" onClick={exportMeets}>⬇ CSV出力</button><button className="btn-primary" onClick={()=>{setMeetF({...emptyEv,id:"M"+String(meets.length+1).padStart(3,"0")});setMeetModal("new");}}>＋ 新規登録</button></div></div>
            <div className="table-wrap">
              <table className="data-table">
                <thead><tr>
                  <th>ID</th>
                  <SortTh label="大会名" sortKey="name" sortState={meetSort} setSortState={setMeetSort}/>
                  <SortTh label="開催日" sortKey="date" sortState={meetSort} setSortState={setMeetSort}/>
                  <SortTh label="会場" sortKey="venue" sortState={meetSort} setSortState={setMeetSort}/>

                </tr></thead>
                <tbody>
                  {sortedMeets.map(m=>(
                    <tr key={m.id}><td className="mono">{m.id}</td><td className="bold">{m.name}</td><td>{m.dates.map(formatDate).join(" 〜 ")}</td><td>{m.venue}</td>
                      <td>{m.lane&&m.lane!=="-"?<span className="lane-badge">{m.lane}</span>:<span style={{color:"#475569"}}>-</span>}</td>
                      <td style={{fontSize:"0.78rem"}}>{m.organizer||"-"}</td>
                      <td>{formatDate(m.deadline)}</td><td>{m.capacity}名</td>
                      <td>
                        <button className="btn-edit" onClick={()=>{setMeetF({...m,dates:[...m.dates]});setMeetModal("edit");}}>編集</button>
                        <button className="btn-delete" onClick={()=>confirm(`「${m.name}」を削除しますか？`,()=>setMeets(p=>p.filter(x=>x.id!==m.id)))}>削除</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}

        {tab==="trainings" && (
          <>
            <div className="page-header"><h2>研修会管理</h2><div style={{display:"flex",gap:"8px"}}><button className="btn-csv" onClick={exportTrainings}>⬇ CSV出力</button><button className="btn-primary" onClick={()=>{setTrainF({...emptyTrain,id:"T"+String(trainings.length+1).padStart(3,"0")});setTrainModal("new");}}>＋ 新規登録</button></div></div>
            <div className="table-wrap">
              <table className="data-table">
                <thead><tr>
                  <th>ID</th>
                  <SortTh label="研修会名" sortKey="name" sortState={trainSort} setSortState={setTrainSort}/>

                  <SortTh label="開催日" sortKey="date" sortState={trainSort} setSortState={setTrainSort}/>

                </tr></thead>

                  {sortedTrainings.map(t=>(
                    <tr key={t.id}><td className="mono">{t.id}</td><td className="bold">{t.name}</td>

                      <td style={{fontSize:"0.78rem"}}>{(t.targetQual||[]).join("・")||<span style={{color:"#475569"}}>全員</span>}</td>
                      <td>{t.dates.map(formatDate).join(" 〜 ")}</td><td>{t.venue}</td>
                      <td style={{fontSize:"0.78rem"}}>{t.organizer||"-"}</td>

              <div className="field-group"><label>読み仮名</label><input value={offF.kana} onChange={e=>setOffF(p=>({...p,kana:e.target.value}))}/></div>
              <div className="field-group"><label>資格</label>

                </select>
              </div>
              <div className="field-group"><label>有効期限</label><input type="date" value={offF.expiry} onChange={e=>setOffF(p=>({...p,expiry:e.target.value}))}/></div>
              <div className="field-group"><label>生年月日</label><input type="date" value={offF.birthdate} onChange={e=>setOffF(p=>({...p,birthdate:e.target.value}))}/></div>
              <div className="field-group field-full"><label>メールアドレス</label><input type="email" value={offF.email||""} onChange={e=>setOffF(p=>({...p,email:e.target.value}))} placeholder="例：yamada@example.com"/></div>
              <div className="field-group field-full"><label>携帯電話</label><input type="tel" value={offF.phone||""} onChange={e=>setOffF(p=>({...p,phone:e.target.value}))} placeholder="例：090-1234-5678"/></div>
              <div className="field-group field-full">
                <label>パスワード{offModal==="edit"&&<span style={{fontWeight:"normal",color:"#64748b",marginLeft:"6px"}}>（変更する場合のみ入力）</span>}</label>
                <input type="text" value={offF.password||""} onChange={e=>setOffF(p=>({...p,password:e.target.value}))} placeholder={offModal==="edit"?"空欄のままにすると現在のパスワードを維持します":"ログイン用パスワードを設定"} autoComplete="off"/>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn-secondary" onClick={()=>setOffModal(null)}>キャンセル</button>
              <button className="btn-primary" onClick={saveOff}>保存</button>
            </div>
          </div>
        </div>
      )}
      {meetModal && <EventModal form={meetF} setForm={setMeetF} modal={meetModal} setModal={setMeetModal} save={saveMeet} prefix="大会"/>}
      {trainModal && (
        <div className="modal-overlay">
          <div className="modal modal-wide" onClick={e=>e.stopPropagation()}>
            <h3>{trainModal==="new"?"研修会 新規登録":"研修会 編集"}</h3>
            <div className="form-grid">
              <div className="field-group"><label>ID</label><input value={trainF.id} onChange={e=>setTrainF(p=>({...p,id:e.target.value}))} readOnly={trainModal==="edit"}/></div>
              <div className="field-group field-full"><label>研修会名</label><input value={trainF.name} onChange={e=>setTrainF(p=>({...p,name:e.target.value}))}/></div>
              <div className="field-group"><label>種別</label>
                <select value={trainF.category||"任意"} onChange={e=>setTrainF(p=>({...p,category:e.target.value}))}>
                  <option value="義務">義務</option><option value="任意">任意</option><option value="推奨">推奨</option>
                </select>
              </div>
              <div className="field-group"><label>主催団体</label><input value={trainF.organizer||""} onChange={e=>setTrainF(p=>({...p,organizer:e.target.value}))} placeholder="例：福岡県水泳連盟審判委員会"/></div>
              <div className="field-group field-full">
                <label>対象資格（複数選択可）</label>
                <div className="qual-check-row">
                  {["A級審判","B級審判","C級審判","なし"].map(q=>{
                    const checked=(trainF.targetQual||[]).includes(q);
                    return (
                      <label key={q} className="qual-check-label">
                        <input type="checkbox" checked={checked} onChange={()=>{
                          const tq=trainF.targetQual||[];
                          setTrainF(p=>({...p,targetQual:checked?tq.filter(x=>x!==q):[...tq,q]}));
                        }}/> {q}
                      </label>
                    );
                  })}
                  <span className="qual-check-hint">（未選択の場合は全員対象）</span>
                </div>
              </div>
              <div className="field-group field-full">
                <label>開催日（複数日対応）</label>
                {trainF.dates.map((d,i)=>(
                  <div key={i} className="date-row">
                    <input type="date" value={d} onChange={e=>{const nd=[...trainF.dates];nd[i]=e.target.value;setTrainF(p=>({...p,dates:nd}));}}/>
                    {trainF.dates.length>1&&<button className="btn-icon-del" onClick={()=>setTrainF(p=>({...p,dates:p.dates.filter((_,j)=>j!==i)}))}>✕</button>}
                  </div>
                ))}
                <button className="btn-add-date" onClick={()=>setTrainF(p=>({...p,dates:[...p.dates,""]}))}>＋ 日付を追加</button>
              </div>
              <div className="field-group"><label>会場</label><input value={trainF.venue} onChange={e=>setTrainF(p=>({...p,venue:e.target.value}))}/></div>
              <div className="field-group"><label>受付締切日</label><input type="date" value={trainF.deadline} onChange={e=>setTrainF(p=>({...p,deadline:e.target.value}))}/></div>
              <div className="field-group"><label>定員</label><input type="number" value={trainF.capacity} onChange={e=>setTrainF(p=>({...p,capacity:e.target.value}))}/></div>
              <div className="field-group field-full"><label>備考・メモ</label><textarea value={trainF.notes||""} onChange={e=>setTrainF(p=>({...p,notes:e.target.value}))} placeholder="例：A・B級審判は必ず出席のこと" rows={2} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(56,189,248,0.2)",borderRadius:"8px",padding:"10px 12px",color:"#e2eaf5",fontFamily:"'Noto Sans JP',sans-serif",fontSize:"0.9rem",outline:"none",resize:"vertical"}}/></div>
            </div>
            <div className="modal-actions">
              <button className="btn-secondary" onClick={()=>setTrainModal(null)}>キャンセル</button>
              <button className="btn-primary" onClick={saveTrain}>保存</button>
            </div>
          </div>
        </div>
      )}
      {confirmDlg && (
        <div className="modal-overlay" onClick={()=>setConfirmDlg(null)}>
          <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
            <div className="confirm-icon">{confirmDlg.onOk ? "🗑️" : "⚠️"}</div>
            <div className="confirm-message">{confirmDlg.message}</div>
            <div className="confirm-actions">
              {confirmDlg.onOk ? (
                <>
                  <button className="btn-secondary" onClick={()=>setConfirmDlg(null)}>キャンセル</button>
                  <button className="btn-delete-confirm" onClick={()=>{ confirmDlg.onOk(); setConfirmDlg(null); }}>削除する</button>
                </>
              ) : (
                <button className="btn-primary" onClick={()=>setConfirmDlg(null)}>OK</button>
              )}
            </div>
          </div>
        </div>
      )}
      {csvModal && (
        <div className="modal-overlay" onClick={()=>setCsvModal(null)}>
          <div className="csv-modal" onClick={e=>e.stopPropagation()}>
            <div className="csv-modal-header">
              <div>
                <div className="csv-modal-title">📋 {csvModal.title}</div>
                <div className="csv-modal-hint">テキストをコピーしてExcelに貼り付けてください</div>
              </div>
              <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                <button className="btn-csv" style={{fontSize:"0.82rem",padding:"7px 14px"}} onClick={()=>{
                  navigator.clipboard.writeText(csvModal.content).then(()=>{
                    setCsvModal(p=>({...p,copied:true}));
                    setTimeout(()=>setCsvModal(p=>p?{...p,copied:false}:null),2000);
                  }).catch(()=>{
                    const ta=document.getElementById("csv-ta");
                    if(ta){ta.select();document.execCommand("copy");setCsvModal(p=>({...p,copied:true}));setTimeout(()=>setCsvModal(p=>p?{...p,copied:false}:null),2000);}
                  });
                }}>{csvModal.copied?"✅ コピー済み！":"📋 全文コピー"}</button>
                <button className="csv-close-btn" onClick={()=>setCsvModal(null)}>✕</button>
              </div>
            </div>
            <textarea id="csv-ta" className="csv-textarea" value={csvModal.content} readOnly
              onClick={e=>e.target.select()} onFocus={e=>e.target.select()}
            />
            <div className="csv-modal-footer">
              💡 テキストエリアをクリックで全選択 → Ctrl+C（Mac: ⌘+C）でコピー
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== DASHBOARD =====
function Dashboard({ officials, meets, trainings, attendance, todayStr }) {
  const upM = meets.filter(m=>m.dates[0]>=todayStr).length;
  const upT = trainings.filter(t=>t.dates[0]>=todayStr).length;
  const expired = officials.filter(o=>o.expiry&&o.expiry<todayStr).length;
  const qualC = ["A級審判","B級審判","C級審判","なし"].map(q=>({q,c:officials.filter(o=>o.qualification===q).length}));
  const nextM = meets.filter(m=>m.dates[0]>=todayStr).sort((a,b)=>a.dates[0].localeCompare(b.dates[0])).slice(0,3);
  return (
    <>
      <div className="page-header"><h2>ダッシュボード</h2></div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-num">{officials.length}</div><div className="stat-label">登録役員数</div></div>
        <div className="stat-card accent"><div className="stat-num">{upM}</div><div className="stat-label">開催予定大会</div></div>
        <div className="stat-card accent"><div className="stat-num">{upT}</div><div className="stat-label">予定研修会</div></div>
        <div className="stat-card warn"><div className="stat-num">{expired}</div><div className="stat-label">資格期限切れ</div></div>
      </div>
      <div className="dash-row">
        <div className="dash-block">
          <div className="section-title">資格別役員数</div>
          {qualC.map(({q,c})=>(
            <div key={q} className="qual-row">
              <span className="qual-label">{q}</span>
              <div className="qual-bar-wrap"><div className="qual-bar" style={{width:`${officials.length?(c/officials.length)*100:0}%`}}/></div>
              <span className="qual-count">{c}名</span>
            </div>
          ))}
        </div>
        <div className="dash-block">
          <div className="section-title">直近の大会</div>
          {nextM.map(m=>(
            <div className="upcoming-item" key={m.id}>
              <div className="upcoming-name">{m.name}</div>
              <div className="upcoming-meta">{m.dates.map(formatDate).join(" 〜 ")} / {m.venue} / {m.lane}</div>
              <div className="upcoming-att-mini">
                {m.dates.map(date=>{
                  const y=officials.filter(o=>attendance[`${o.id}_${m.id}_${date}`]==="参加").length;
                  const n=officials.filter(o=>attendance[`${o.id}_${m.id}_${date}`]==="不参加").length;
                  return <div key={date} style={{marginTop:"3px"}}>
                    <span style={{fontSize:"0.7rem",color:"#64748b"}}>{formatDate(date)}：</span>
                    <span className="att-mini-yes">参加 {y}名</span>
                    <span className="att-mini-no">不参加 {n}名</span>
                    <span className="att-mini-pending">未回答 {officials.length-y-n}名</span>
                  </div>;
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ===== ROOT =====
function App() {
  const [auth, setAuth] = useState(null);
  const [officials, setOfficials] = useState(initialOfficials);
  const [meets, setMeets] = useState(initialMeets);
  const [trainings, setTrainings] = useState(initialTrainings);
  const [attendance, setAttendance] = useState({});
  const [dbLoaded, setDbLoaded] = useState(false);
  const [loadError, setLoadError] = useState(false);

  // ログイン後に全データをGASから取得
  
  useEffect(() => {
    if (!auth || dbLoaded) return;
    api({ action: "getAll" }).then(res => {
      if (res.error) { setLoadError(true); return; }
      if (res.officials?.length)  setOfficials(res.officials);
      if (res.meets?.length)      setMeets(res.meets);
      if (res.trainings?.length)  setTrainings(res.trainings);
      if (res.attendance)         setAttendance(res.attendance);
      setDbLoaded(true);
    }).catch(() => setLoadError(true));
  }, [auth]);

  // データ変更時にGASへ自動保存（dbLoaded後のみ）
  useEffect(() => { if (dbLoaded) api({ action:"saveOfficials", data:officials }); }, [officials]);
  useEffect(() => { if (dbLoaded) api({ action:"saveMeets",     data:meets     }); }, [meets]);
  useEffect(() => { if (dbLoaded) api({ action:"saveTrainings", data:trainings }); }, [trainings]);
  useEffect(() => { if (dbLoaded) api({ action:"saveAttendance",data:attendance}); }, [attendance]);

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600;700&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans JP',sans-serif;background:#0a1628;color:#e2eaf5;}
        .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(160deg,#0a1628 0%,#0c2340 50%,#0a1e35 100%);}
        .login-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
        .wave{position:absolute;left:-10%;width:120%;height:2px;background:linear-gradient(90deg,transparent,rgba(56,189,248,0.15),transparent);animation:wavemove 8s linear infinite;}

        .csv-textarea:focus{outline:none;border-color:rgba(56,189,248,0.35);}
        .csv-modal-footer{font-size:0.75rem;color:#475569;text-align:center;}
        .csv-close-btn{background:rgba(100,116,139,0.15);border:1px solid rgba(100,116,139,0.25);color:#94a3b8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
        .csv-close-btn:hover{background:rgba(248,113,113,0.15);color:#f87171;border-color:rgba(248,113,113,0.3);}
        .confirm-dialog{background:#0d2040;border:1px solid rgba(248,113,113,0.3);border-radius:16px;padding:32px 28px;width:360px;text-align:center;animation:fadeup 0.2s ease;}
        .confirm-icon{font-size:2rem;margin-bottom:12px;}
        .confirm-message{font-size:0.95rem;color:#e2eaf5;line-height:1.6;margin-bottom:24px;}
        .confirm-actions{display:flex;gap:10px;justify-content:center;}
        .btn-delete-confirm{background:linear-gradient(135deg,#dc2626,#f87171);border:none;color:white;padding:9px 22px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:600;transition:all 0.2s;}
        .btn-delete-confirm:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(248,113,113,0.35);}
        .loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0a1628;}
        .loading-spinner{width:44px;height:44px;border:3px solid rgba(56,189,248,0.15);border-top-color:#38bdf8;border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .loading-text{color:#7dd3fc;font-family:'Outfit',sans-serif;font-size:0.9rem;}
        .loading-error{color:#f87171;font-size:0.85rem;text-align:center;line-height:1.6;}
      `}</style>
      {!auth && <LoginScreen onLogin={(r,id)=>{setAuth({role:r,userId:id}); setDbLoaded(false);}}/>}
      {auth && !dbLoaded && !loadError && (
        <div className="loading-screen">
          <div className="loading-spinner"/>
          <div className="loading-text">スプレッドシートからデータを読み込んでいます...</div>
        </div>
      )}
      {auth && !dbLoaded && loadError && (
        <div className="loading-screen">
          <div style={{fontSize:"2rem"}}>⚠️</div>
          <div className="loading-error">
            データの読み込みに失敗しました。<br/>
            ネットワークを確認してページを再読み込みしてください。
          </div>
          <button className="btn-secondary" onClick={()=>{setAuth(null);setLoadError(false);}}>ログイン画面に戻る</button>
        </div>
      )}
      {auth && dbLoaded && auth.role==="official" && <OfficialView userId={auth.userId} officials={officials} setOfficials={setOfficials} meets={meets} trainings={trainings} attendance={attendance} setAttendance={setAttendance} onLogout={()=>{setAuth(null);setDbLoaded(false);}}/>}
      {auth && dbLoaded && auth.role==="admin" && <AdminView officials={officials} setOfficials={setOfficials} meets={meets} setMeets={setMeets} trainings={trainings} setTrainings={setTrainings} attendance={attendance} onLogout={()=>{setAuth(null);setDbLoaded(false);}}/>}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
